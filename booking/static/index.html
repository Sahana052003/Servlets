<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flight Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<form action="login">
    <div class="form">
    <div class="name">
    <label for="name">UserName</label>
    <input type="text" name="name" id="name" placeholder="eg. Sora"><br><br>
    </div>
    <div class="email">
    <label for="email">Email-id</label>
    <input type="email" name="email" id="email" placeholder="eg. sora123@gmail.com"><br><br>
    </div>
    <div class="password">
        <label for="password">Password</label>
    <input type="password" name="password" id="password" placeholder="Enter Password"><br><br>
    </div>
    <div class="age">
        <label for="age">Age</label>
    <input type="number" name="age" id="age"><br><br>
    </div>
    <div class="mobile">
    <label for="mobileNo">Mobile NUmber</label>
    <input type="tel" name="mobileNo" id="mobileNo" placeholder="123-456-7890"><br><br>
    </div>
        <button class="submit">Submit</button>
    </div>
</form>
</body>
</html>
