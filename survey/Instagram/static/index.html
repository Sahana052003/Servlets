<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instagram-Page</title>
</head>
<body>
<form action="run" method="post">
    <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label">Email address</label><br>
        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="email">
        <div id="emailHelp" class="form-text"></div>
    </div>
    <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Password</label><br>
        <input type="password" class="form-control" id="exampleInputPassword1" name="password">
    </div>
    <div class="col-md-4">
        <label for="validationCustom01" class="form-label">First name</label><br>
        <input type="text" class="form-control" id="validationCustom01" value="Mark" required name="firstName">
        <div class="valid-feedback">
            Looks good!
        </div>
    </div>
    <div class="col-md-4">
        <label for="validationCustom02" class="form-label">Last name</label><br>
        <input type="text" class="form-control" id="validationCustom02" value="Otto" required name="lastName">
        <div class="valid-feedback">
            Looks good!
        </div>
    </div>
    <div class="col-md-4">
        <label for="validationCustomUsername" class="form-label">Username</label>
        <div class="input-group has-validation">
            <span class="input-group-text" id="inputGroupPrepend">@</span>
            <input type="text" class="form-control" id="validationCustomUsername" name="userName" aria-describedby="inputGroupPrepend" required>
            <div class="invalid-feedback">
                Please choose a username.
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <label for="validationCustom03" class="form-label">City</label><br>
        <input type="text" class="form-control" id="validationCustom03" required name="city">
        <div class="invalid-feedback">
            Please provide a valid city.
        </div>
    </div>
    <div class="col-md-3">
        <label for="validationCustom04" class="form-label">State</label><br>
        <select class="form-select" id="validationCustom04" required name="state">
            <option selected disabled value="">Choose...</option>
            <option>Karnataka</option>
            <option>Hyderabad</option>
            <option>Hyderabad</option>
        </select>
        <div class="invalid-feedback">
            Please select a valid state.
        </div>
    </div>
    <div class="col-md-3">
        <label for="validationCustom05" class="form-label">Zip</label><br>
        <input type="text" class="form-control" id="validationCustom05" required name="zip">
        <div class="invalid-feedback">
            Please provide a valid zip.
        </div>
    </div><br>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1">
        <label class="form-check-label" for="exampleCheck1">Check me out</label>
    </div><br>
    <div class="form-check">
        <label>Gender</label><br>
        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1" name="gender">
        <label class="form-check-label" for="radioDefault1">
            Male
        </label>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" name="gender1"checked>
        <label class="form-check-label" for="radioDefault2">
           Female
        </label>
    </div><br>
    <select class="form-select" aria-label="Default select example">
        <option selected>Favorite</option>
        <option value="1">Pick best name to login</option>
        <option value="2">Give a pet Name</option>
        <option value="3">Best place</option>
    </select><br><br>
    <button type="submit" class="btn btn-primary">Submit</button>
</form>
</body>
</html>
